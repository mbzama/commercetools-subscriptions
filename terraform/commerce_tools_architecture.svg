<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Arial, sans-serif">
  <rect width="960" height="340" fill="#f8f9fb" rx="12"/>
  <!-- commercetools zone -->
  <rect x="20" y="20" width="180" height="300" fill="#e8f4fd" rx="10" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="110" y="42" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">commercetools</text>
  <!-- AWS zone -->
  <rect x="230" y="20" width="710" height="300" fill="#fff8e1" rx="10" stroke="#ffca28" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="585" y="42" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">AWS</text>
  <!-- 1. CT Platform -->
  <rect x="40" y="60" width="140" height="54" rx="8" fill="#1976d2"/>
  <text x="110" y="83" text-anchor="middle" font-size="12" fill="white" font-weight="bold">commercetools</text>
  <text x="110" y="101" text-anchor="middle" font-size="11" fill="#bbdefb">Platform</text>
  <!-- 2. CT Subscription -->
  <rect x="40" y="148" width="140" height="54" rx="8" fill="#0288d1"/>
  <text x="110" y="171" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Subscription</text>
  <text x="110" y="189" text-anchor="middle" font-size="11" fill="#b3e5fc">type: EventBridge</text>
  <!-- 3. Partner Event Source -->
  <rect x="255" y="148" width="155" height="54" rx="8" fill="#f57c00"/>
  <text x="333" y="167" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Partner Event Source</text>
  <text x="333" y="185" text-anchor="middle" font-size="9" fill="#fff3e0">aws.partner/commercetools…</text>
  <!-- 4. Custom Event Bus -->
  <rect x="440" y="148" width="140" height="54" rx="8" fill="#e65100"/>
  <text x="510" y="171" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Event Bus</text>
  <text x="510" y="189" text-anchor="middle" font-size="11" fill="#ffccbc">Custom (partner)</text>
  <!-- 5. EventBridge Rule -->
  <rect x="610" y="148" width="140" height="54" rx="8" fill="#6a1e9a"/>
  <text x="680" y="171" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Rule</text>
  <text x="680" y="189" text-anchor="middle" font-size="11" fill="#e1bee7">resource_type: order</text>
  <!-- 6. SQS Queue -->
  <rect x="780" y="148" width="150" height="54" rx="8" fill="#2e7d32"/>
  <text x="855" y="171" text-anchor="middle" font-size="12" fill="white" font-weight="bold">SQS Queue</text>
  <text x="855" y="189" text-anchor="middle" font-size="11" fill="#c8e6c9">ct-order-events</text>
  <!-- 7. DLQ -->
  <rect x="780" y="252" width="150" height="44" rx="8" fill="#b71c1c"/>
  <text x="855" y="270" text-anchor="middle" font-size="12" fill="white" font-weight="bold">DLQ</text>
  <text x="855" y="286" text-anchor="middle" font-size="10" fill="#ffcdd2">after 3 failures</text>
  <!-- 8. Node.js Consumer -->
  <rect x="610" y="252" width="140" height="44" rx="8" fill="#37474f"/>
  <text x="680" y="271" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Node.js App</text>
  <text x="680" y="287" text-anchor="middle" font-size="10" fill="#cfd8dc">consumer.js</text>
  <!-- Arrows -->
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#42a5f5"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#fb8c00"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8e24aa"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#388e3c"/></marker>
    <marker id="agr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#546e7a"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e53935"/></marker>
  </defs>
  <line x1="110" y1="114" x2="110" y2="148" stroke="#42a5f5" stroke-width="2" marker-end="url(#ab)"/>
  <text x="115" y="135" font-size="9" fill="#1565c0">OrderCreated</text>
  <line x1="180" y1="175" x2="255" y2="175" stroke="#fb8c00" stroke-width="2" marker-end="url(#ao)"/>
  <text x="190" y="168" font-size="9" fill="#e65100">auto-creates</text>
  <line x1="410" y1="175" x2="440" y2="175" stroke="#fb8c00" stroke-width="2" marker-end="url(#ao)"/>
  <text x="413" y="168" font-size="9" fill="#e65100">associate</text>
  <line x1="580" y1="175" x2="610" y2="175" stroke="#8e24aa" stroke-width="2" marker-end="url(#ap)"/>
  <text x="582" y="168" font-size="9" fill="#6a1e9a">match</text>
  <line x1="750" y1="175" x2="780" y2="175" stroke="#388e3c" stroke-width="2" marker-end="url(#ag)"/>
  <text x="752" y="168" font-size="9" fill="#2e7d32">forward</text>
  <line x1="780" y1="195" x2="748" y2="252" stroke="#546e7a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#agr)"/>
  <text x="742" y="235" font-size="9" fill="#37474f">long poll</text>
  <line x1="855" y1="202" x2="855" y2="252" stroke="#e53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <!-- Step numbers -->
  <circle cx="148" cy="131" r="9" fill="#1565c0"/><text x="148" y="135" text-anchor="middle" font-size="9" fill="white" font-weight="bold">1</text>
  <circle cx="218" cy="172" r="9" fill="#e65100"/><text x="218" y="176" text-anchor="middle" font-size="9" fill="white" font-weight="bold">2</text>
  <circle cx="426" cy="172" r="9" fill="#e65100"/><text x="426" y="176" text-anchor="middle" font-size="9" fill="white" font-weight="bold">3</text>
  <circle cx="596" cy="172" r="9" fill="#6a1e9a"/><text x="596" y="176" text-anchor="middle" font-size="9" fill="white" font-weight="bold">4</text>
  <circle cx="766" cy="172" r="9" fill="#2e7d32"/><text x="766" y="176" text-anchor="middle" font-size="9" fill="white" font-weight="bold">5</text>
  <circle cx="766" cy="220" r="9" fill="#37474f"/><text x="766" y="224" text-anchor="middle" font-size="9" fill="white" font-weight="bold">6</text>
</svg>
